<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pleth Analyzer Final</title>
    <style>
        :root { 
            --bg: #020617; --panel: #0f172a; --accent: #22d3ee; --text: #f8fafc; 
            --blue-main: #3b82f6; --blue-hover: #2563eb;
        }
        * { touch-action: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 500px; background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid #334155; }

        /* Área del Visor */
        .viewport { 
            width: 100%; height: 300px; background: #000; border-radius: 8px; 
            overflow: hidden; position: relative; border: 2px solid #1e293b; margin-bottom: 15px;
        }
        #canvasWrapper { position: absolute; transform-origin: 0 0; }
        #selectionRect { 
            position: absolute; border: 2px solid #fff; background: rgba(255,255,255,0.2); 
            pointer-events: none; display: none; z-index: 100; 
        }

        /* Botones de Acción */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        button { 
            padding: 12px; border: none; border-radius: 8px; font-weight: 700; 
            font-size: 10px; text-transform: uppercase; background: var(--blue-main); color: white;
        }

        /* Sliders Verticales (Uno encima de otro) */
        .controls-stack { display: flex; flex-direction: column; gap: 12px; background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { font-size: 10px; font-weight: bold; color: #94a3b8; text-transform: uppercase; }
        input[type=range] { width: 100%; height: 30px; accent-color: var(--accent); touch-action: pan-x; }

        /* Tabla con Scrollbar */
        .table-scroll { 
            width: 100%; overflow-x: auto; background: #020617; border-radius: 8px; 
            border: 1px solid #334155; -webkit-overflow-scrolling: touch;
        }
        /* Estilo de la barra de desplazamiento para que sea visible */
        .table-scroll::-webkit-scrollbar { height: 8px; }
        .table-scroll::-webkit-scrollbar-thumb { background: var(--blue-main); border-radius: 4px; }

        .results-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 450px; }
        .results-table th { background: #1e293b; padding: 12px 8px; color: var(--accent); text-align: center; }
        .results-table td { padding: 12px 8px; border-bottom: 1px solid #1e293b; text-align: center; }
        
        .val-badge { padding: 4px 6px; border-radius: 4px; background: #334155; font-family: monospace; }
        .btn-del { background: var(--blue-main); width: 32px; height: 32px; border-radius: 50%; font-weight: bold; }
        
        .avg-row { background: #1e293b; font-weight: bold; font-size: 14px; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="viewport" id="viewport">
        <div id="canvasWrapper">
            <canvas id="mainCanvas"></canvas>
            <div id="selectionRect"></div>
        </div>
    </div>

    <div class="btn-grid">
        <input type="file" id="fileIn" hidden accept="image/*">
        <button onclick="document.getElementById('fileIn').click()">Galería</button>
        <input type="file" id="camIn" hidden accept="image/*" capture="environment">
        <button onclick="document.getElementById('camIn').click()">Cámara</button>
        <button onclick="resetView()" style="background:#475569">Reset Foto</button>
    </div>

    <div class="controls-stack">
        <div class="control-group">
            <label>Brillo: <span id="bVal">100</span>%</label>
            <input type="range" id="bri" min="20" max="250" value="100">
        </div>
        <div class="control-group">
            <label>Saturación: <span id="sVal">100</span>%</label>
            <input type="range" id="sat" min="0" max="300" value="100">
        </div>
        <div class="control-group">
            <label>Contraste: <span id="cVal">100</span>%</label>
            <input type="range" id="con" min="40" max="250" value="100">
        </div>
    </div>

    <div class="table-scroll">
        <table class="results-table">
            <thead>
                <tr>
                    <th>Ciclo</th>
                    <th>H (Sístole)</th>
                    <th>h (Diástole)</th>
                    <th>Relación h/H</th>
                    <th>Borrar</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
            <tfoot>
                <tr class="avg-row">
                    <td colspan="3" style="text-align: right; padding-right: 15px;">PROMEDIO:</td>
                    <td id="avgVal" colspan="2" style="text-align: left;">-</td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
    const wrapper = document.getElementById('canvasWrapper'), viewport = document.getElementById('viewport');
    const rectUI = document.getElementById('selectionRect'), tbody = document.getElementById('tbody');
    
    let imgOriginal = null, rels = [];
    let scale = 1, offsetX = 0, offsetY = 0;
    let isDrawing = false, startX, startY;
    let tp = { dist: 0, scale: 1, x: 0, y: 0 }; // Touch Pan/Zoom state

    // --- CARGA ---
    const loadImg = (e) => {
        if (!e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            imgOriginal = new Image();
            imgOriginal.onload = () => {
                canvas.width = 1000; canvas.height = 1000 * (imgOriginal.height / imgOriginal.width);
                resetView();
                render();
            };
            imgOriginal.src = f.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };
    document.getElementById('fileIn').onchange = loadImg;
    document.getElementById('camIn').onchange = loadImg;

    function render() {
        if (!imgOriginal) return;
        const b = document.getElementById('bri').value, s = document.getElementById('sat').value, c = document.getElementById('con').value;
        document.getElementById('bVal').innerText = b; document.getElementById('sVal').innerText = s; document.getElementById('cVal').innerText = c;
        ctx.filter = `brightness(${b}%) saturate(${s}%) contrast(${c}%)`;
        ctx.drawImage(imgOriginal, 0, 0, canvas.width, canvas.height);
        ctx.filter = "none";
        wrapper.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
    }
    ['bri','sat','con'].forEach(id => document.getElementById(id).oninput = render);

    function resetView() {
        scale = viewport.clientWidth / canvas.width;
        offsetX = 0; offsetY = 0;
        render();
    }

    // --- MULTI-TOUCH: 1 DEDO (DIBUJO) | 2 DEDOS (ZOOM/PAN) ---
    viewport.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            isDrawing = true;
            const r = wrapper.getBoundingClientRect();
            startX = (e.touches[0].clientX - r.left) / scale;
            startY = (e.touches[0].clientY - r.top) / scale;
            rectUI.style.display = 'block';
        } else if (e.touches.length === 2) {
            isDrawing = false;
            rectUI.style.display = 'none';
            tp.dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            tp.scale = scale;
            tp.x = e.touches[0].clientX - offsetX;
            tp.y = e.touches[0].clientY - offsetY;
        }
    }, {passive: false});

    viewport.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (isDrawing && e.touches.length === 1) {
            const r = wrapper.getBoundingClientRect();
            let curX = (e.touches[0].clientX - r.left) / scale;
            let curY = (e.touches[0].clientY - r.top) / scale;
            rectUI.style.width = Math.abs(curX - startX) + "px";
            rectUI.style.height = Math.abs(curY - startY) + "px";
            rectUI.style.left = Math.min(curX, startX) + "px";
            rectUI.style.top = Math.min(curY, startY) + "px";
        } else if (e.touches.length === 2) {
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            scale = tp.scale * (dist / tp.dist);
            offsetX = e.touches[0].clientX - tp.x;
            offsetY = e.touches[0].clientY - tp.y;
            render();
        }
    }, {passive: false});

    viewport.addEventListener('touchend', () => {
        if (isDrawing) {
            isDrawing = false;
            const area = { x: parseFloat(rectUI.style.left), y: parseFloat(rectUI.style.top), w: parseFloat(rectUI.style.width), h: parseFloat(rectUI.style.height) };
            rectUI.style.display = 'none';
            if (area.w > 10) analizar(area);
        }
    });

    // --- MOTOR DE ANÁLISIS ---
    function analizar(area) {
        render();
        const data = ctx.getImageData(area.x, area.y, area.w, area.h).data;
        let pts = [];
        for (let x = 0; x < area.w; x++) {
            for (let y = 0; y < area.h; y++) {
                const i = (y * Math.floor(area.w) + x) * 4;
                const r = data[i]/255, g = data[i+1]/255, b = data[i+2]/255;
                if (((Math.max(r,g,b)-Math.min(r,g,b))/Math.max(r,g,b) > 0.42) && Math.max(r,g,b) > 0.15) {
                    pts.push({x: x + area.x, y: y + area.y}); break;
                }
            }
        }
        if (pts.length < 10) return;
        
        let sm = [];
        for (let i = 0; i < pts.length; i++) {
            let sumY = 0, c = 0;
            for (let j = i-3; j<=i+3; j++) { if(pts[j]){sumY+=pts[j].y; c++;} }
            sm.push({x: pts[i].x, y: sumY/c});
        }

        const valles = [], picos = [], win = 25;
        for (let i = win; i < sm.length - win; i++) {
            let max = true, min = true;
            for (let j = i-win; j<=i+win; j++) {
                if (sm[j].y < sm[i].y) max = false;
                if (sm[j].y > sm[i].y) min = false;
            }
            if (max && (picos.length === 0 || sm[i].x - picos[picos.length-1].x > 40)) picos.push(sm[i]);
            if (min && (valles.length === 0 || sm[i].x - valles[valles.length-1].x > 40)) valles.push(sm[i]);
        }

        valles.forEach((vB, idx) => {
            if (idx % 2 !== 0) return; 
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 6;
            ctx.beginPath(); ctx.moveTo(vB.x, area.y); ctx.lineTo(vB.x, area.y+area.h); ctx.stroke();
            const limX = valles[idx+2] ? valles[idx+2].x : area.x + area.w;
            const sub = [...picos, ...valles].filter(p => p.x > vB.x && p.x < limX).sort((a,b)=>a.x-b.x);
            let s=0, d=0;
            ctx.lineWidth = 3;
            sub.slice(0,3).forEach((h, hi) => {
                ctx.beginPath(); ctx.moveTo(h.x, area.y); ctx.lineTo(h.x, area.y+area.h); ctx.stroke();
                let v = Math.abs(vB.y - h.y); if(hi===0) s=v; if(hi===2) d=v;
            });
            const r = s>0 ? parseFloat((d/s).toFixed(2)) : 0;
            if(r > 0) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>#${tbody.children.length+1}</td><td><span class="val-badge">${s.toFixed(1)}</span></td><td><span class="val-badge">${d.toFixed(1)}</span></td><td style="color:var(--accent); font-weight:bold">${r.toFixed(2)}</td><td><button class="btn-del" onclick="this.closest('tr').remove(); updateAvg();">X</button></td>`;
                tbody.appendChild(tr);
            }
        });
        updateAvg();
    }

    function updateAvg() {
        const rows = Array.from(tbody.querySelectorAll('td:nth-child(4)')).map(td => parseFloat(td.innerText));
        document.getElementById('avgVal').innerText = rows.length > 0 ? (rows.reduce((a,b)=>a+b,0)/rows.length).toFixed(2) : "-";
    }
</script>
</body>
</html>
